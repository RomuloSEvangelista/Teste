<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Card Collector TI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Fundo idêntico à tela de compras/carrinho */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%); 
            color: white;
            min-height: 100vh;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
        }

        /* Ajuste das Caixas (Cards) */
        .card-auth { 
            background: rgba(20, 20, 20, 0.8); /* Fundo escuro semi-transparente */
            backdrop-filter: blur(10px); /* Efeito de vidro embaçado */
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.3s ease;
            color: white;
        }

        .card-auth:hover { 
            transform: translateY(-5px); 
            border-color: #f1c40f; /* Brilho dourado no hover */
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.1) !important;
        }

        /* Gradiente para a caixa de Cadastro */
        .bg-dark-gradient { 
            background: linear-gradient(135deg, #1a1a1a 0%, #2c3e50 100%); 
        }

        /* Estilização dos Inputs Dark */
        .form-control {
            background-color: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }

        .form-control:focus {
            border-color: #f1c40f !important;
            box-shadow: 0 0 8px rgba(241, 196, 15, 0.3);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Botões */
        .btn-gold {
            background-color: #f1c40f;
            color: black;
            font-weight: bold;
            border: none;
        }

        .btn-gold:hover {
            background-color: #d4ac0d;
            color: black;
        }

        .btn-outline-gold {
            border: 2px solid #f1c40f;
            color: #f1c40f;
            background: transparent;
            font-weight: bold;
        }

        .btn-outline-gold:hover {
            background: #f1c40f;
            color: black;
        }
    </style>
</head>
<body class="d-flex align-items-center">

    <main class="container my-5">
        <div class="row justify-content-center g-4">
            
            <!-- Coluna de Login (Lado Esquerdo) -->
            <div class="col-12 col-lg-5">
                <div class="card card-auth shadow-lg rounded-4 h-100">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <img src="./img/logo_serratec.png" alt="Serratec" height="50" class="mb-3" style="filter: brightness(0) invert(1);">
                            <h2 class="hero-title fw-bold">BEM-VINDO</h2>
                            <p class="text-white-50">Acesse sua conta para ver os cards</p>
                        </div>
                       
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">E-mail</label>
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="seu@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Senha</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="******" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-gold btn-lg shadow-sm">ENTRAR NO SISTEMA</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Coluna de Cadastro (Lado Direito) -->
            <div class="col-12 col-lg-5">
                <div class="card card-auth shadow-lg rounded-4 h-100 bg-dark-gradient border-secondary">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="hero-title fw-bold text-white">NOVO POR AQUI?</h2>
                            <p class="text-white-50">Crie sua conta em poucos segundos</p>
                        </div>
                       
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="regEmail" class="form-label fw-semibold text-white">E-mail de Cadastro</label>
                                <input type="email" class="form-control form-control-lg" id="regEmail" placeholder="seu@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label for="regPassword" class="form-label fw-semibold text-white">Crie uma Senha</label>
                                <input type="password" class="form-control form-control-lg" id="regPassword" placeholder="Mínimo 6 caracteres" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-outline-gold btn-lg shadow-sm">CRIAR MINHA CONTA</button>
                            </div>
                        </form>
                        <div class="mt-4 text-center">
                            <small class="text-white-50">Ao se cadastrar, você concorda com os termos da Serratec 2026.</small>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center mt-5">
            <a href="index.html" class="text-decoration-none text-white-50 fw-semibold">
                <span class="me-2">←</span> Voltar para a vitrine de cards
            </a>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
