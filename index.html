<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serratec | Collector Deck</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts Épica -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { 
            background: radial-gradient(circle, #1a1a2e 0%, #000000 100%); 
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .hero-title {
            font-family: 'Cinzel', serif;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }
        .navbar { background: rgba(0,0,0,0.95) !important; border-bottom: 1px solid #333; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar ATUALIZADA -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold hero-title fs-3" href="index.html">SERRATEC COLLECTOR</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <!-- Link para a página que mostra todas as cartas -->
                        <a class="nav-link" href="catalogo.html">Cartas Disponíveis</a>
                    </li>
                    <li class="nav-item mx-lg-3">
                        <a class="btn btn-outline-warning position-relative" href="cart.html">
                            🛒 Meu Deck
                            <span id="cart-count" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <button onclick="logoutSerratec()" class="btn btn-sm btn-danger">Sair</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header & Filtros -->
    <header class="container my-5 text-center">
        <h1 class="display-3 hero-title mb-2">GRIMÓRIO DE CARDS</h1>
        <p class="text-white-50 mb-5">Colecione os lendários mestres e alunos do Serratec 2026</p>
        
        <div class="row g-3 justify-content-center bg-dark p-4 rounded-4 shadow-lg border border-secondary">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control bg-black text-white border-secondary p-3" placeholder="Buscar por nome do mestre...">
            </div>
            <div class="col-md-4">
                <select id="filterType" class="form-select bg-black text-white border-secondary p-3">
                    <option value="all">Todas as Classes</option>
                    <option value="Logica de Programação">Lógica de Programação</option>
                    <option value="Banco de Dados">Banco de Dados</option>
                    <option value="Alunos">Alunos</option>
                    <option value="POO">POO</option>
                </select>
            </div>
        </div>
    </header>

    <!-- Container dos Cards -->
    <main class="container mb-5">
        <!-- Onde a mágica acontece via js/main.js -->
        <div id="card-container" class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Cards injetados aqui -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black text-white-50 py-4 mt-auto border-top border-secondary">
        <div class="container text-center">
            <small>© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Sua lógica central -->
    <script src="js/main.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
