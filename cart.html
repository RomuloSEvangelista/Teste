<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Deck | Serratec Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: radial-gradient(circle, #1a1a2e 0%, #000000 100%); font-family: 'Inter', sans-serif; }
        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .card-cart { border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 hero-title" href="index.html">SERRATEC COLLECTOR</a>
            <div class="ms-auto d-flex gap-2">
                <a href="./colecao/colecao.html" class="btn btn-outline-warning btn-sm">Minha Coleção</a>
                <a href="./colecao/catalogo.html" class="btn btn-outline-light btn-sm">Voltar ao Grimório</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="hero-title text-center mb-5">Meu Deck Selecionado</h1>

        <div class="row g-4">
            <!-- Lista de Itens no Carrinho -->
            <div class="col-lg-8">
                <div id="cart-items-container" class="d-flex flex-column gap-3">
                    <!-- Cards do carrinho aparecerão aqui via js/cart.js -->
                </div>
            </div>

            <!-- Resumo da Compra -->
            <div class="col-lg-4">
                <div class="card bg-black border-secondary p-4 shadow-lg sticky-top" style="top: 100px;">
                    <h3 class="fw-bold mb-4 hero-title" style="font-size: 1.5rem;">Resumo do Deck</h3>
                    
                    <div class="d-flex justify-content-between mb-2">
                        <span>Cartas selecionadas:</span>
                        <span id="total-items" class="fw-bold text-warning">0</span>
                    </div>
                    
                    <hr class="border-secondary">
                    
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5">Investimento:</span>
                        <span class="fs-5 fw-bold text-warning" id="cart-total">R$ 0,00</span>
                    </div>

                    <!-- BOTÃO ÚNICO DE FINALIZAR -->
                    <button class="btn btn-warning w-100 fw-bold py-3 mb-3 shadow" onclick="finalizarCompra()">
                        FINALIZAR E GUARDAR NO DECK
                    </button>
                    
                    <button class="btn btn-outline-danger w-100 btn-sm opacity-75" onclick="clearCart()">
                        Esvaziar Carrinho
                    </button>
                </div>
            </div>
        </div>
    </main>

      <footer class="bg-black text-white-50 py-4 mt-auto border-top border-secondary text-center">
        <div class="container">
            <small>© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</small>
        </div>
    </footer>

    <!-- ORDEM DOS SCRIPTS: Base primeiro (onde está a função finalizarCompra) -->
    <script src="js/base.js"></script> 
    <script src="js/cart.js"></script>
</body>
</html>
