<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Deck | Serratec Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top border-bottom border-secondary">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-warning" href="index.html" style="font-family: 'Cinzel', serif;">SERRATEC COLLECTOR</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm">Voltar ao Grimório</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h1 class="hero-title text-center mb-5" style="font-family: 'Cinzel', serif;">Meu Deck Selecionado</h1>

        <div class="row g-4">
            <!-- Lista de Itens no Carrinho -->
            <div class="col-lg-8">
                <div id="cart-items-container" class="d-flex flex-column gap-3">
                    <!-- Cards do carrinho aparecerão aqui -->
                </div>
            </div>

            <!-- Resumo da Compra -->
            <div class="col-lg-4">
                <div class="card bg-black border-secondary p-4 shadow-lg sticky-top" style="top: 100px;">
                    <h3 class="fw-bold mb-4" style="font-family: 'Cinzel', serif;">Resumo do Deck</h3>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Cartas no Deck:</span>
                        <span id="total-items">0</span>
                    </div>
                    <hr class="border-secondary">
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fs-5">Valor Total:</span>
                        <span class="fs-5 fw-bold text-warning" id="cart-total">R$ 0,00</span>
                    </div>
                    <button class="btn btn-warning w-100 fw-bold py-2 mb-2" onclick="checkout()">Finalizar Compra</button>
                    <button class="btn btn-outline-danger w-100 btn-sm" onclick="clearCart()">Esvaziar Deck</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black text-white-50 py-4 mt-auto border-top border-secondary text-center">
        <small>© 2026 Serratec Deck Builder</small>
    </footer>

    <script src="js/cart.js"></script>
    <script src="js/main.js"></script> <!-- Importante para o logout funcionar -->
</body>
</html>
