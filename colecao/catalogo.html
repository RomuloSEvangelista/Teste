<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas Disponíveis | Serratec Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle, #1a1a2e 0%, #000000 100%); font-family: 'Inter', sans-serif; color: white; }
        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .navbar { background: rgba(0,0,0,0.95) !important; border-bottom: 1px solid #333; }
        main { margin-top: 40px; }
        .card-item { transition: transform 0.3s; border: 1px solid rgba(255,255,255,0.1) !important; }
        .card-item:hover { transform: scale(1.03); border-color: #f1c40f !important; }
        .saldo-badge { background: rgba(241,196,15,0.1); border: 1px solid rgba(241,196,15,0.3); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; }
    </style>
</head> 
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold hero-title fs-3" href="../index.html">SERRATEC</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <span id="saldo-usuario" class="saldo-badge text-warning" style="display:none;">
                    👤 <span id="nome-usuario"></span> &nbsp;|&nbsp; 💰 R$ <span id="valor-saldo">0,00</span>
                </span>
                <a class="btn btn-outline-warning btn-sm" href="colecao.html">✨ Minha Coleção</a>
                <a class="btn btn-outline-warning position-relative" href="../cart.html">
                    🛒 Carrinho
                    <span id="cart-count" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">0</span>
                </a>
                <button onclick="logout()" class="btn btn-sm btn-danger">Sair</button>
            </div>
        </div>
    </nav>

    <header class="container my-5 text-center">
        <h1 class="display-4 hero-title mb-4">Grimório de Mestres</h1>
        <div class="row g-3 justify-content-center bg-dark p-4 rounded-4 shadow-lg">
            <div class="col-md-6">
                <input type="text" id="searchInputCatalogo" class="form-control bg-black text-white border-secondary" placeholder="Buscar mestre...">
            </div>
            <div class="col-md-4">
                <select id="filterTypeCatalogo" class="form-select bg-black text-white border-secondary">
                    <option value="all">Todas as Classes</option>
                    <option value="Logica de Programação">Lógica</option>
                    <option value="Banco de Dados">Banco de Dados</option>                   
                    <option value="POO">Java POO</option>
                    <option value="Front End">Front End</option>
                    <option value="Alunos">Alunos</option>
                </select>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div id="card-container-catalogo" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- JS vai injetar aqui -->
        </div>
    </main>

    <footer class="bg-black text-white-50 py-4 mt-auto border-top border-secondary text-center">
    <div class="container">
        <p class="mb-2">© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</p>
        <div class="d-flex align-items-center justify-content-center gap-2">
            <span>Developed by <strong>Romulo Evangelista</strong></span>

</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/base.js"></script>
    <script src="../js/catalogo.js"></script>
    <script src="../js/cart.js"></script>
</body>
</html>
