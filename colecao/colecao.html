<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Coleção | Serratec Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        body { 
            background: radial-gradient(circle, #1a1a2e 0%, #000000 100%); 
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
        }
        .hero-title {
            font-family: 'Cinzel', serif;
            color: #f1c40f;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.5);
        }
        .content-wrapper {
            flex: 1 0 auto;
        }

        /* Card inteiro, sem cortar imagem */
        .card-colecao {
            border: 1px solid #f1c40f !important;
            transition: 0.3s;
            background: rgba(20, 20, 20, 0.85) !important;
        }
        .card-colecao:hover {
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            transform: translateY(-4px);
        }
        .card-colecao img {
            width: 100%;
            height: auto;        /* altura automática — carta inteira */
            object-fit: contain; /* não corta, não distorce */
            padding: 8px;
            background: #0d0d0d;
        }
        .btn-remover {
            background: transparent;
            border: 1px solid #dc3545;
            color: #dc3545;
            font-size: 0.75rem;
            transition: 0.3s;
        }
        .btn-remover:hover {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-5">
            <div class="container">
                <a class="navbar-brand hero-title fs-3" href="catalogo.html">SERRATEC</a>
                <a href="catalogo.html" class="btn btn-outline-light btn-sm">Voltar ao Catálogo</a>
            </div>
        </nav>
        
        <div class="container mb-5">
            <header class="text-center mb-5">
                <h1 class="hero-title display-4">Meu Deck Pessoal</h1>
                <p class="text-white-50">Estas são as relíquias que você já conquistou.</p>
            </header>

            <div id="colecao-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
                <!-- JS injeta aqui -->
            </div>
        </div>
    </div>

    <footer class="bg-black text-white-50 py-4 border-top border-secondary text-center">
        <div class="container">
            <small>© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</small>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));

            if (!usuarioLogado) {
                window.location.href = "./login/login.html";
                return;
            }

            const usuarioId = usuarioLogado.email || usuarioLogado["e-mail"];
            const chaveColecao = `deck_${usuarioId}`;

            function renderColecao() {
                const minhaColecao = JSON.parse(localStorage.getItem(chaveColecao)) || [];
                const container = document.getElementById('colecao-container');

                if (minhaColecao.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center mt-5">
                            <p class="fs-4 opacity-50">Seu grimório está vazio...</p>
                            <a href="catalogo.html" class="btn btn-warning">Ir às compras</a>
                        </div>`;
                    return;
                }

                container.innerHTML = "";
                minhaColecao.forEach((card, index) => {
                    container.innerHTML += `
                        <div class="col">
                            <div class="card card-colecao text-white">
                                <img src="${card.img}" 
                                     alt="${card.name}"
                                     onerror="this.src='../img/padrao.png'">
                                <div class="card-body text-center d-flex flex-column">
                                    <h5 class="fw-bold mb-0">${card.name}</h5>
                                    <p class="text-warning small mb-3">${card.type}</p>
                                    <div class="mt-auto d-flex flex-column gap-2">
                                        <span class="badge bg-success w-100">ADQUIRIDA</span>
                                        <button class="btn btn-remover w-100" onclick="removerCard(${index})">
                                            🗑️ Remover da Coleção
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
            }

            // Expõe a função globalmente para o onclick funcionar
            window.removerCard = function(index) {
                const confirmou = confirm("Deseja remover esta carta da sua coleção?");
                if (!confirmou) return;

                const minhaColecao = JSON.parse(localStorage.getItem(chaveColecao)) || [];
                minhaColecao.splice(index, 1);
                localStorage.setItem(chaveColecao, JSON.stringify(minhaColecao));

                renderColecao(); // Re-renderiza sem recarregar a página
            };

            renderColecao();
        });
    </script>
</body>
</html>
