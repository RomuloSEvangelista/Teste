<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Coleção | Serratec Collector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; }
        body { background: radial-gradient(circle, #1a1a2e 0%, #000000 100%); font-family: 'Inter', sans-serif; color: white; display: flex; flex-direction: column; }
        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.5); }
        .content-wrapper { flex: 1 0 auto; }
        .card-colecao { border: 1px solid #f1c40f !important; transition: 0.3s; background: rgba(20, 20, 20, 0.85) !important; }
        .card-colecao:hover { box-shadow: 0 0 20px rgba(241, 196, 15, 0.4); transform: translateY(-4px); }
        .card-colecao img { width: 100%; height: auto; object-fit: contain; padding: 8px; background: #0d0d0d; }
        .btn-remover { background: transparent; border: 1px solid #dc3545; color: #dc3545; font-size: 0.75rem; transition: 0.3s; }
        .btn-remover:hover { background: #dc3545; color: white; }
        .saldo-badge { background: rgba(241,196,15,0.1); border: 1px solid rgba(241,196,15,0.3); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <nav class="navbar navbar-dark bg-black border-bottom border-secondary mb-5">
            <div class="container">
                <a class="navbar-brand hero-title fs-3" href="../index.html">SERRATEC</a>
                <div class="d-flex align-items-center gap-2">
                    <span id="saldo-usuario" class="saldo-badge text-warning" style="display:none;">
                        👤 <span id="nome-usuario"></span> &nbsp;|&nbsp; 💰 R$ <span id="valor-saldo">0,00</span>
                    </span>
                    <a href="catalogo.html" class="btn btn-outline-light btn-sm">Voltar ao Catálogo</a>
                    <button onclick="logout()" class="btn btn-sm btn-danger">Sair</button>
                </div>
            </div>
        </nav>

        <div class="container mb-5">
            <header class="text-center mb-3">
                <h1 class="hero-title display-4">Meu Deck Pessoal</h1>
                <p class="text-white-50">Estas são as relíquias que você já conquistou.</p>
            </header>
            <div id="colecao-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 justify-content-center">
                <!-- JS injeta aqui -->
            </div>
        </div>
    </div>

   <footer class="bg-black text-white-50 py-4 mt-auto border-top border-secondary text-center">
    <div class="container">
        <p class="mb-2">© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</p>
        <div class="d-flex align-items-center justify-content-center gap-2">
            <span>Developed by <strong>Romulo Evangelista</strong></span>
            <a href="https://github.com/RomuloSEvangelista" target="_blank" class="text-white">
                <!-- Ícone do GitHub via Bootstrap Icons -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-github shadow-filter" viewBox="0 0 16 16">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
                </svg>
            </a>
        </div>
    </div>
</footer>

    <script src="../js/base.js"></script>
    <script>
        const baseCartasOficial = [
            { id_card: 1,  name: "Prof. Raphael",   price: 850.00, type: "Logica de Programação", img: "../img/Raphael.png"   },
            { id_card: 2,  name: "Prof. Romulo",    price: 121.00, type: "Banco de Dados",        img: "../img/Romulo.png"    },
            { id_card: 3,  name: "Ivy",             price: 3.00,   type: "Alunos",                img: "../img/ivy.png"       },
            { id_card: 4,  name: "Prof. Breno",     price: 250.00, type: "POO",                   img: "../img/breno.png"     },
            { id_card: 5,  name: "Prof. Menegueli", price: 200.00, type: "Front End",             img: "../img/menegueli.png" },
            { id_card: 6,  name: "Leilton",         price: 2.50,   type: "Alunos",                img: "../img/Leilton.png"   },
            { id_card: 7,  name: "Arthur",          price: 25.00,  type: "Alunos",                img: "../img/Arthur.png"    },
            { id_card: 8,  name: "Gabriel",         price: 0.50,   type: "Alunos",                img: "../img/Gabriel.png"   },
            { id_card: 9,  name: "Icaro",           price: 33.00,  type: "Alunos",                img: "../img/Icaro.png"     },
            { id_card: 10, name: "Guilherme",       price: 25.00,  type: "Alunos",                img: "../img/Guilherme.png" },
            { id_card: 11, name: "Wenderson",       price: 91.50,  type: "Alunos",                img: "../img/Wenderson.png" },
            { id_card: 12, name: "Pedro A.",        price: 84.00,  type: "Alunos",                img: "../img/PedroA.png"    },
            { id_card: 12, name: "Victor",          price: 62.00, type: "Alunos",                img: "../img/Victor.png"    },
            { id_card: 14, name: "Luiz",            price: 82.00, type: "Alunos",                img: "../img/Luiz.png"      },
            { id_card: 15, name: "Mateus",          price: 78.00, type: "Alunos",                img: "../img/Mateus.png"    },
            { id_card: 16, name: "Estevão",         price: 71.00, type: "Alunos",                img: "../img/Estevao.png"   },
            { id_card: 17, name: "Emanuel",         price: 75.00, type: "Alunos",                img: "../img/Emmanuel.png"  },
            { id_card: 18, name: "Yuri",            price: 83.00, type: "Alunos",                img: "../img/Yuri.png"      },
            { id_card: 19, name: "Luisa",           price: 89.00, type: "Alunos",                img: "../img/Luiza.png"     },
            { id_card: 20, name: "Natasha",         price: 75.00, type: "Alunos",                img: "../img/Natasha.png"   }
        ];

        function getCardById(id_card) {
            return baseCartasOficial.find(c => c.id_card == id_card) || null;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
            if (!usuarioLogado) { window.location.href = "../login/login.html"; return; }

            const container = document.getElementById('colecao-container');
            container.innerHTML = `<div class="col-12 text-center text-white-50"><p>Carregando coleção...</p></div>`;

            try {
                const res = await fetch(`https://69f60881a72f01a951b91cd8.mockapi.io/cards/${usuarioLogado.id}`);
                const usuarioAtual = await res.json();
                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioAtual));

                const idCards = usuarioAtual.id_card || [];

                if (idCards.length === 0) {
                    container.innerHTML = `
                        <div style="width:100%; text-align:center; padding-top:3rem;">
                            <p class="fs-4 opacity-50">Seu grimório está vazio...</p>
                            <a href="../loja/loja.html" class="btn btn-warning">Ir à Loja</a>
                        </div>`;
                    return;
                }

                container.innerHTML = "";
                idCards.forEach((idCard, index) => {
                    const card  = getCardById(idCard);
                    const nome  = card ? card.name  : `Card #${idCard}`;
                    const tipo  = card ? card.type  : "Desconhecido";
                    const img   = card ? card.img   : "https://placehold.co/350x450?text=Card";
                    const price = card ? card.price : 0;

                    container.innerHTML += `
                        <div class="col">
                            <div class="card card-colecao text-white">
                                <img src="${img}" alt="${nome}" onerror="this.src='https://placehold.co/350x450?text=Card'">
                                <div class="card-body text-center d-flex flex-column">
                                    <h5 class="fw-bold mb-0">${nome}</h5>
                                    <p class="text-warning small mb-3">${tipo}</p>
                                    <div class="mt-auto d-flex flex-column gap-2">
                                        <span class="text-white-50 small">💰 Avaliada em R$ ${price.toFixed(2).replace('.', ',')}</span>
                                        <span class="badge bg-success w-100">ADQUIRIDA</span>
                                        <button class="btn btn-remover w-100" onclick="removerCard(${index})">
                                            🗑️ Remover da Coleção
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="col-12 text-center text-danger"><p>Erro ao carregar coleção.</p></div>`;
            }

            window.removerCard = async function(index) {
                const confirmou = confirm("Deseja remover esta carta da sua coleção?");
                if (!confirmou) return;
                const usuarioAtual = JSON.parse(localStorage.getItem('usuarioLogado'));
                const idCards = usuarioAtual.id_card || [];
                idCards.splice(index, 1);
                await fetch(`https://69f60881a72f01a951b91cd8.mockapi.io/cards/${usuarioAtual.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_card: idCards })
                });
                usuarioAtual.id_card = idCards;
                localStorage.setItem('usuarioLogado', JSON.stringify(usuarioAtual));
                location.reload();
            };
        });
    </script>
</body>
</html>
