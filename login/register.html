<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Card Collector TI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }
        main { flex: 1; } 

        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        
        .card-auth { 
            background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(241, 196, 15, 0.2); 
            transition: all 0.3s ease; 
        }

        .form-control { 
            background-color: rgba(255, 255, 255, 0.05) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2) !important; 
            color: white !important; 
        }

        .form-control:focus {
            border-color: #f1c40f !important;
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.2);
        }

        /* --- ESTILIZAÇÃO DO BOTÃO --- */
        .btn-gold { 
            background-color: #f1c40f; 
            color: black; 
            font-weight: 800; 
            border: none; 
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
        }

        .btn-gold:hover { 
            background-color: #ffda44; 
            color: black;
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.5);
        }

        .btn-gold:active {
            transform: translateY(0);
        }

        .form-label {

            color: #cfc59c !important; /* Cor Dourada */

            letter-spacing: 0.5px;

            text-transform: uppercase; /* Opcional: deixa em caixa alta para um ar mais épico */

            font-size: 0.85rem;}
    </style>
    

        
</head>
<body class="d-flex align-items-center">
    <main class="container py-5 d-flex align-items-center">
        <div class="row justify-content-center w-100 m-0">
            <div class="col-12 col-md-6 col-lg-4">
                
                <div class="card card-auth shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <h2 class="hero-title fw-bold">CADASTRO</h2>
                            <p class="text-white-50">Inicie sua jornada lendária</p>
                        </div>
                       
                        <form id="registerForm">
                            <div class="mb-3">
                                <label for="regNome" class="form-label fw-semibold">Nome Completo</label>
                                <input type="text" class="form-control" id="regNome" placeholder="Seu nome" required>
                            </div>

                            <div class="mb-3">
                                <label for="regEmail" class="form-label fw-semibold">E-mail de Cadastro</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="seu@email.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="regPassword" class="form-label fw-semibold">Crie uma Senha</label>
                                <input type="password" class="form-control" id="regPassword" placeholder="Mínimo 6 dígitos" required>
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirme a Senha</label>
                                <input type="password" class="form-control" id="confirmPassword" placeholder="Repita a senha" required>
                            </div>

                            <div class="d-grid gap-2">
                                <!-- Botão atualizado para btn-gold -->
                                <button type="submit" class="btn btn-gold btn-lg">CRIAR MINHA CONTA</button>
                                <a href="login.html" class="btn btn-link btn-sm text-white-50 mt-2 text-decoration-none">Já tenho uma conta</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="../index.html" class="text-decoration-none text-white-50 small">
                        <span class="me-1">←</span> Voltar ao Início
                    </a>
                </div>

            </div>
        </div>
    </main>

       <footer class="bg-black text-white-50 py-4 mt-auto border-top border-secondary text-center">
    <div class="container">
        <p class="mb-2">© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</p>
        <div class="d-flex align-items-center justify-content-center gap-2">
            <span>Developed by <strong>Romulo Evangelista</strong></span>

            </a>
        </div>
    </div>
</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="usuarioScript.js"></script>
</body>
</html>
