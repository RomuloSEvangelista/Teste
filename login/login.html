<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Card Collector TI</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Ajuste para o Footer fixo no final */
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%); 
            color: white; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
        }
        main { flex: 1; } /* Faz o conteúdo principal crescer */

        .hero-title { font-family: 'Cinzel', serif; color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }
        .card-auth { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .form-control { background-color: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; }
        .btn-gold { background-color: #f1c40f; color: black; font-weight: bold; border: none; }
        .btn-gold:hover { background-color: #d4ac0d; }
    </style>
    <style>

.form-label {

            color: #cfc59c !important; /* Cor Dourada */

            letter-spacing: 0.5px;

            text-transform: uppercase; /* Opcional: deixa em caixa alta para um ar mais épico */

            font-size: 0.85rem;

        }



 </style>
</head>
<body>
    <main class="container py-5 d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 80px);">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-auth shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <img src="../img/logo_serratec.png" alt="Serratec" height="40" class="mb-3" style="filter: brightness(0) invert(1);">
                            <h2 class="hero-title fw-bold">ACESSO</h2>
                            <p class="text-white-50">Entre no seu Grimório</p>
                        </div>
                       
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">E-mail</label>
                                <input type="email" class="form-control form-control-lg" id="email" placeholder="seu@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Senha</label>
                                <input type="password" class="form-control form-control-lg" id="password" placeholder="******" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-gold btn-lg">ENTRAR</button>
                                <hr class="my-3 border-secondary">
                                <p class="text-center text-white-50 small mb-1">Novo por aqui?</p>
                                <a href="register.html" class="btn btn-outline-light">CRIAR NOVA CONTA</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="../index.html" class="text-decoration-none text-white-50 small">← Voltar ao Início</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Inserido -->
    <footer class="bg-black text-white-50 py-4 border-top border-secondary text-center w-100">
        <div class="container">
            <small>© 2026 Serratec Deck Builder - O conhecimento é sua melhor carta.</small>
        </div>
    </footer>
      
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../login/usuarioScript.js"></script>
</body>
</html>
